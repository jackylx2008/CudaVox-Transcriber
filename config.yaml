app:
  log_level: ${LOG_LEVEL:-INFO}
  input_path: ${INPUT_FILE:-./input}
  output_dir: ${OUTPUT_PATH:-./output}
  temp_dir: ${TEMP_DIR:-./output/tmp}
  cleanup_temp: ${CLEANUP_TEMP:-true}
  ffmpeg_bin: ${FFMPEG_BIN:-ffmpeg}
  supported_extensions:
    - .wav
    - .mp3
    - .m4a
    - .flac
    - .aac

device:
  preferred: ${DEVICE:-cuda:0}
  allow_cpu_fallback: ${ALLOW_CPU_FALLBACK:-true}

asr:
  backend: ${ASR_BACKEND:-funasr}

funasr:
  model: ${FUNASR_MODEL:-FunAudioLLM/Fun-ASR-Nano-2512}
  vad_model: ${FUNASR_VAD_MODEL:-}
  punc_model: ${FUNASR_PUNC_MODEL:-}
  hub: ${FUNASR_HUB:-ms}
  batch_size_s: ${FUNASR_BATCH_SIZE_S:-120}
  hotword: ${FUNASR_HOTWORD:-}
  max_single_segment_time: ${FUNASR_MAX_SINGLE_SEGMENT_TIME:-30000}
  language: ${FUNASR_LANGUAGE:-}
  itn: ${FUNASR_ITN:-true}
  trust_remote_code: ${FUNASR_TRUST_REMOTE_CODE:-false}

sensevoice:
  model: ${SENSEVOICE_MODEL:-iic/SenseVoiceSmall}
  hub: ${SENSEVOICE_HUB:-ms}
  batch_size_s: ${SENSEVOICE_BATCH_SIZE_S:-120}
  hotword: ${SENSEVOICE_HOTWORD:-}
  language: ${SENSEVOICE_LANGUAGE:-zh}
  itn: ${SENSEVOICE_ITN:-true}
  trust_remote_code: ${SENSEVOICE_TRUST_REMOTE_CODE:-true}

qwen_text:
  enabled: ${QWEN_TEXT_ENABLED:-true}
  base_url: ${QWEN_LLM_BASE_URL:-http://127.0.0.1:8080/v1}
  model: ${QWEN_LLM_MODEL:-Qwen3.6-27B-Q4_K_M}
  api_key: ${QWEN_API_KEY:-}
  request_timeout_seconds: ${QWEN_TEXT_REQUEST_TIMEOUT_SECONDS:-60}
  temperature: ${QWEN_TEMPERATURE:-0}
  enable_segment_cleanup: ${QWEN_ENABLE_SEGMENT_CLEANUP:-false}
  enable_summary: ${QWEN_ENABLE_SUMMARY:-true}
  enable_structured_output: ${QWEN_ENABLE_STRUCTURED_OUTPUT:-true}
  segment_cleanup_max_tokens: ${QWEN_SEGMENT_CLEANUP_MAX_TOKENS:-256}
  summary_max_tokens: ${QWEN_SUMMARY_MAX_TOKENS:-1024}
  structured_max_tokens: ${QWEN_STRUCTURED_MAX_TOKENS:-1024}
  summary_input_max_chars: ${QWEN_SUMMARY_INPUT_MAX_CHARS:-12000}

llamacpp:
  base_url: ${LLAMACPP_BASE_URL:-http://127.0.0.1:8080/v1}
  model: ${LLAMACPP_MODEL:-Qwen3.6-27B-Q4_K_M}
  autostart: ${LLAMACPP_AUTOSTART:-false}
  server_path: ${LLAMACPP_SERVER_PATH:-}
  model_path: ${LLAMACPP_MODEL_PATH:-}
  mmproj_path: ${LLAMACPP_MMPROJ_PATH:-}
  extra_dll_dirs: ${LLAMACPP_EXTRA_DLL_DIRS:-}
  n_gpu_layers: ${LLAMACPP_N_GPU_LAYERS:-999}
  ctx_size: ${LLAMACPP_CTX_SIZE:-8192}
  host: ${LLAMACPP_HOST:-127.0.0.1}
  port: ${LLAMACPP_PORT:-8080}
  reasoning: ${LLAMACPP_REASONING:-off}
  reasoning_budget: ${LLAMACPP_REASONING_BUDGET:-0}
  startup_timeout_seconds: ${LLAMACPP_STARTUP_TIMEOUT_SECONDS:-300}

pyannote:
  model: ${PYANNOTE_MODEL:-pyannote/speaker-diarization-community-1}
  token: ${HUGGINGFACE_TOKEN:-}
  num_speakers: ${NUM_SPEAKERS:-}
  min_speakers: ${MIN_SPEAKERS:-}
  max_speakers: ${MAX_SPEAKERS:-}
  min_segment_seconds: ${MIN_SEGMENT_SECONDS:-0.6}

campp:
  model: ${CAMPP_MODEL:-iic/speech_campplus_sv_zh-cn_16k-common}
  similarity_threshold: ${CAMPP_SIMILARITY_THRESHOLD:-0.72}
  relaxed_similarity_threshold: ${CAMPP_RELAXED_SIMILARITY_THRESHOLD:-0.69}
  relaxed_similarity_margin: ${CAMPP_RELAXED_SIMILARITY_MARGIN:-0.04}
  relaxed_min_samples: ${CAMPP_RELAXED_MIN_SAMPLES:-2}
  named_similarity_threshold: ${CAMPP_NAMED_SIMILARITY_THRESHOLD:-0.64}
  named_similarity_margin: ${CAMPP_NAMED_SIMILARITY_MARGIN:-0.08}
  named_min_samples: ${CAMPP_NAMED_MIN_SAMPLES:-5}
  db_dir: ${VOICEPRINT_DB_DIR:-./output/voiceprints}
  metadata_file: ${VOICEPRINT_METADATA_FILE:-speakers.json}
  speaker_prefix: ${VOICEPRINT_SPEAKER_PREFIX:-speaker_}
  min_profile_seconds: ${VOICEPRINT_MIN_PROFILE_SECONDS:-1.5}
  max_profile_audio_seconds: ${VOICEPRINT_MAX_PROFILE_AUDIO_SECONDS:-30.0}

pipeline:
  merge_gap_seconds: ${MERGE_GAP_SECONDS:-0.4}

output:
  write_json: ${WRITE_JSON:-true}
  write_txt: ${WRITE_TXT:-true}
  write_srt: ${WRITE_SRT:-true}
